<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Játék</title>
    <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
    <script src="../bootstrap/js/popper.min.js"></script>
    <script src="../bootstrap/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="../css/index.css" />
    <script src="../javascript/postGet.js"></script>
    <script src="../javascript/game.js"></script>
</head>
<body>
    <div class="container-fluid ibg d-flex justify-content-center align-items-center" id="endGameContainer" style="display: none;">
        <div id="endGameScreen" class="text-center">
            <h2 id="endGameMessage" class="mb-4"></h2>
            <button id="backToMainBtn" class="btn btn-lg m-2">Vissza a főoldalra</button>
            <button id="newGameBtn" class="btn btn-lg m-2">Új játék</button>
        </div>
    </div>  

    <div class="container-fluid ibg" id="mainGameContainer">
        <div class="row">
            <div class="col-md-2" id="prizeDiv">
                <div class="row d-flex align-items-evenly">
                    <div class="col-sm-12 p-1" id="level15">
                        <span id="questionNumber">15</span>
                        <span id="pemsz">150 000 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level14">
                        <span id="questionNumber">14</span>
                        <span id="pemsz">85 000 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level13">
                        <span id="questionNumber">13</span>
                        <span id="pemsz">50 000 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level12">
                        <span id="questionNumber">12</span>
                        <span id="pemsz">25 000 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level11">
                        <span id="questionNumber">11</span>
                        <span id="pemsz">10 000 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level10">
                        <span id="questionNumber">10</span>
                        <span id="pemsz">5 000 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level9">
                        <span id="questionNumber">9</span>
                        <span id="pemsz">3 000 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level8">
                        <span id="questionNumber">8</span>
                        <span id="pemsz">2 000 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level7">
                        <span id="questionNumber">7</span>
                        <span id="pemsz">1 000 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level6">
                        <span id="questionNumber">6</span>
                        <span id="pemsz">500 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level5">
                        <span id="questionNumber">5</span>
                        <span id="pemsz">300 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level4">
                        <span id="questionNumber">4</span>
                        <span id="pemsz">200 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level3">
                        <span id="questionNumber">3</span>
                        <span id="pemsz">100 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level2">
                        <span id="questionNumber">2</span>
                        <span id="pemsz">50 000 Ft</span>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-12 p-1" id="level1">
                        <span id="questionNumber">1</span>
                        <span id="pemsz">25 000 Ft</span>
                    </div>
                </div>
            </div>

            <div class="col-md-9 text-center gameArea">
                <div class="row ">
                    <div class="col-sm-12">
                        <h1 id="questionBody" class="display-4"></h1>
                    </div>
                </div>

                <div class="row" id="answers">
                    <div class="col-sm-6 mb-3">
                        <button id="answer1" class="btn valaszBtn"></button>
                    </div>
                    <div class="col-sm-6 mb-3">
                        <button id="answer2" class="btn valaszBtn"></button>
                    </div>
                    <div class="col-sm-6 mb-3">
                        <button id="answer3" class="btn valaszBtn"></button>
                    </div>
                    <div class="col-sm-6 mb-3">
                        <button id="answer4" class="btn valaszBtn"></button>
                    </div>
                </div>

                <div id="continueModal" class="continue-modal">
                    <div id="continueMessage"></div>
                    <div class="continue-buttons">
                        <button id="continueYesBtn" class="btn btn-success btn-lg">Továbblépek</button>
                        <button id="continueNoBtn" class="btn btn-danger btn-lg">Megállok</button>
                    </div>
                </div>
            </div>

            <div class="row" id="takeWinBtnRow" style="display: none;">
                <input type="button" id="takeWinBtn" class="btn btn-warning btn-lg w-100" value="Megállok a nyereménynél">
            </div>
        </div>
    </div>
</body>
</html>
