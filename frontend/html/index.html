<!DOCTYPE html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Legyél milliomos!</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="../css/index.css" />
        <!--!JavaScript-->
        <script src="../javascript/index.js"></script>
    </head>
    <body>
        <div class="container-fluid">
            <div class="row text-center">
                <h1 class="display-1" style="margin-bottom: 50px;">Legyen ön is milliomos főoldal</h1>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-6 text-center" id="loginContainer" style="display: block;">
                    <button id="loginBtn" class="btn btn-primary btn-lg">Bejelentkezés</button>
                    <button id="registerBtn" class="btn btn-secondary btn-lg">Regisztráció</button>
                </div>
            </div>
        </div>
        
        <div id="gameContainer" class="container mt-5" style="display: none;">
            <div class="row justify-content-center">
                <div class="col-md-8 text-center" style="display: flex; max-width: 300px; flex-direction: column;">
                    <h2>Üdvözlünk <span id="userName"></span>!</h2>
                    <button id="startGameBtn" style="margin: 10px;" class="btn btn-success btn-lg">Játék kezdése</button>
                    <button id="logoutBtn" style="margin: 10px;" class="btn btn-danger btn-lg">Kijelentkezés</button>
                </div>
                <input type="button" id="adminBtn" value="Admin" style="display: none;" class="btn btn-warning btn-lg mt-3" />
            </div>
        </div>
        
        <script src="../javascript/index.js"></script>
    </body>
</html>
