<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Admin</title>

        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>

        <script src="../javascript/postGet.js"></script>
        <script src="../javascript/admin.js"></script>
    </head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <div class="col-sm-12">Admin</div>
            </div>

            <div class="row">
                <div class="col-sm-12">
                    <p>Kérdés hozzáadása</p>

                    <form id="questionForm">
                        <label for="questionBody">Adja meg az új kérdést</label>
                        <input type="text" id="questionBody" />

                        <select id="difficultySelect">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                            <option>5</option>
                            <option>6</option>
                            <option>7</option>
                            <option>8</option>
                            <option>9</option>
                            <option>10</option>
                            <option>11</option>
                            <option>12</option>
                            <option>13</option>
                            <option>14</option>
                            <option>15</option>
                        </select>

                        <label for="answer1">Első válasz</label>
                        <input type="text" id="answer1" />
                        <input type="radio" id="firstCorrect" name="correctAnswer" />

                        <label for="answer2">Második válasz</label>
                        <input type="text" id="answer2" />
                        <input type="radio" id="secondCorrect" name="correctAnswer" />

                        <label for="answer3">Harmadik válasz</label>
                        <input type="text" id="answer3" />
                        <input type="radio" id="thirdCorrect" name="correctAnswer" />

                        <label for="answer4">Negyedik válasz</label>
                        <input type="text" id="answer4" />
                        <input type="radio" id="fourthCorrect" name="correctAnswer" />

                        <input type="button" id="submitBtn" value="Kérdés hozzáadása"/>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
